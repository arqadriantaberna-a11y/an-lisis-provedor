<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Proveedores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --bg:#f4f1ec;
  --panel:#ffffff;
  --ink:#211b16;
  --muted:#746b62;
  --line:#ddd6cc;
  --brand:#7a4f2b;
  --brand2:#b17945;
  --soft:#eee7de;
  --good:#2d7a46;
  --warn:#c58b1b;
  --bad:#b93a32;
  --shadow:0 18px 45px rgba(33,27,22,.10);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:
    radial-gradient(circle at top left,#fff7ec 0,#f4f1ec 38%,#ece4da 100%);
  color:var(--ink);
}
header{
  background:linear-gradient(135deg,#211b16 0%,#3b2a20 55%,#7a4f2b 100%);
  color:white;
  padding:28px 18px;
  box-shadow:var(--shadow);
}
.header-inner{
  max-width:1180px;
  margin:auto;
  display:flex;
  justify-content:space-between;
  gap:14px;
  align-items:center;
  flex-wrap:wrap;
}
h1{margin:0;font-size:34px;letter-spacing:-.5px}
header p{margin:7px 0 0;color:#f0e4d7}
.status{
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.25);
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
}
main{max-width:1180px;margin:auto;padding:20px}
.card{
  background:rgba(255,255,255,.94);
  border:1px solid var(--line);
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
  box-shadow:var(--shadow);
}
.grid{
  display:grid;
  grid-template-columns:330px 1fr;
  gap:16px;
  align-items:start;
}
h2,h3{margin-top:0}
input,textarea,select{
  width:100%;
  padding:11px 12px;
  margin:6px 0 12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:white;
  color:var(--ink);
  outline:none;
}
input:focus,textarea:focus,select:focus{
  border-color:var(--brand);
  box-shadow:0 0 0 3px rgba(122,79,43,.16);
}
textarea{min-height:90px;resize:vertical}
button{
  background:var(--brand);
  color:white;
  border:0;
  border-radius:12px;
  padding:10px 14px;
  font-weight:700;
  cursor:pointer;
  transition:.15s ease;
}
button:hover{transform:translateY(-1px);filter:brightness(.96)}
button.danger{background:var(--bad)}
button.secondary{background:var(--soft);color:var(--ink)}
button.active{background:var(--brand);color:white}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
.tabs button{background:#efe6dc;color:#2b211a}
.tabs button.active{background:var(--brand);color:#fff}
.item{
  border:1px solid var(--line);
  border-radius:16px;
  padding:13px;
  margin:9px 0;
  cursor:pointer;
  background:#fff;
  transition:.15s ease;
}
.item:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(33,27,22,.08)}
.item.active{border-color:var(--brand);box-shadow:0 0 0 3px rgba(122,79,43,.18)}
.item-top{display:flex;justify-content:space-between;gap:10px;align-items:center}
.small{color:var(--muted);font-size:13px}
.score{
  display:inline-block;
  padding:5px 10px;
  border-radius:999px;
  color:white;
  font-weight:800;
  min-width:52px;
  text-align:center;
}
.ok{background:var(--good)}
.warn{background:var(--warn)}
.bad{background:var(--bad)}
.neutral{background:#8a8178}
.bar-wrap{
  background:#eee7de;
  border-radius:999px;
  height:12px;
  overflow:hidden;
  margin-top:9px;
}
.bar{
  height:100%;
  border-radius:999px;
  background:linear-gradient(90deg,var(--bad),var(--warn),var(--good));
}
.dashboard{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.stat{
  background:linear-gradient(180deg,#fff,#f8f1e9);
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
}
.stat .label{
  color:var(--muted);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:.5px;
}
.stat .num{
  font-size:30px;
  font-weight:900;
  margin-top:7px;
}
.panel-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}
.chart-card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:16px;
}
.chart-row{
  display:grid;
  grid-template-columns:140px 1fr 55px;
  gap:10px;
  align-items:center;
  margin:10px 0;
}
.chart-label{
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
  background:white;
  border-radius:14px;
  overflow:hidden;
}
td,th{
  border-bottom:1px solid var(--line);
  padding:10px;
  text-align:left;
  vertical-align:top;
}
th{
  background:#f3ece4;
  font-size:13px;
  text-transform:uppercase;
  letter-spacing:.3px;
}
.empty{
  background:#fff8ef;
  border:1px dashed #d7c3ad;
  color:var(--muted);
  border-radius:16px;
  padding:18px;
}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.provider-aside{position:sticky;top:12px}
canvas{max-height:280px}
@media(max-width:900px){
  .grid{grid-template-columns:1fr}
  .dashboard{grid-template-columns:repeat(2,1fr)}
  .panel-grid{grid-template-columns:1fr}
  .provider-aside{position:static}
}
@media(max-width:560px){
  main{padding:12px}
  h1{font-size:26px}
  .dashboard{grid-template-columns:1fr}
  .chart-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1>Control de Proveedores</h1>
      <p>Proveedores, empleados, evaluaciones, gráficos y desempeño acumulado</p>
    </div>
    <div class="status" id="estadoConexion">Sin conexión</div>
  </div>
</header>

<main>
<section class="card" id="config">
  <h2>Conexión Supabase</h2>
  <label>Supabase URL</label>
  <input id="url" placeholder="https://xxxxx.supabase.co">
  <label>Clave publicable</label>
  <input id="key" placeholder="sb_publishable_...">
  <button onclick="guardarConexion()">Guardar conexión</button>
</section>

<section class="card" id="dashboard"></section>

<div class="grid">
  <section class="card provider-aside">
    <h2>Proveedores</h2>
    <input id="buscarProveedor" placeholder="Buscar proveedor..." oninput="renderProveedores()">
    <input id="proveedorNombre" placeholder="Nombre del proveedor">
    <button onclick="agregarProveedor()">Agregar proveedor</button>
    <div id="listaProveedores"></div>
  </section>

  <section class="card" id="detalle">
    Seleccioná o cargá un proveedor.
  </section>
</div>
</main>

<script>
let db=null;
let proveedores=[];
let empleados=[];
let evaluaciones=[];
let proveedorActual=null;
let pestaña="desempeno";
let chartGeneral=null;
let chartProveedor=null;

const savedUrl=localStorage.getItem("supabase_url");
const savedKey=localStorage.getItem("supabase_key");

if(savedUrl&&savedKey){
  document.getElementById("url").value=savedUrl;
  document.getElementById("key").value=savedKey;
  conectar(savedUrl,savedKey);
}else{
  document.getElementById("dashboard").innerHTML='<div class="empty">Conectá Supabase para ver las estadísticas.</div>';
}

function guardarConexion(){
  const url=document.getElementById("url").value.trim();
  const key=document.getElementById("key").value.trim();
  if(!url||!key){alert("Pegá la URL y la clave publicable");return}
  localStorage.setItem("supabase_url",url);
  localStorage.setItem("supabase_key",key);
  conectar(url,key);
}

async function conectar(url,key){
  db=supabase.createClient(url,key);
  document.getElementById("config").style.display="none";
  document.getElementById("estadoConexion").innerText="Conectado · guardado automático";
  await cargarTodo();
}

async function cargarTodo(){
  const p=await db.from("providers").select("*").order("created_at",{ascending:false});
  const e=await db.from("employees").select("*").order("created_at",{ascending:false});
  const v=await db.from("evaluations").select("*").order("date",{ascending:false});

  if(p.error){alert("Error proveedores: "+p.error.message);return}
  if(e.error){alert("Error empleados: "+e.error.message);return}
  if(v.error){alert("Error evaluaciones: "+v.error.message);return}

  proveedores=p.data||[];
  empleados=e.data||[];
  evaluaciones=v.data||[];

  if(!proveedorActual && proveedores.length) proveedorActual=proveedores[0].id;
  render();
}

function empleadosDelProveedor(id){return empleados.filter(e=>e.provider_id===id)}
function evalsDelProveedor(id){return evaluaciones.filter(e=>e.provider_id===id)}
function evalsDelEmpleado(id){return evaluaciones.filter(e=>e.employee_id===id)}
function proveedor(){return proveedores.find(p=>p.id===proveedorActual)}

function promedio(lista){
  if(!lista.length)return "-";
  return (lista.reduce((a,b)=>a+Number(b.score||0),0)/lista.length).toFixed(2);
}
function numProm(lista){
  const p=promedio(lista);
  return p==="-"?0:Number(p);
}
function clase(n){
  n=Number(n);
  if(!n)return "neutral";
  return n>=4?"ok":n>=3?"warn":"bad";
}
function anchoBarra(n){
  n=Number(n)||0;
  return Math.max(0,Math.min(100,(n/5)*100));
}
function limpiar(t){
  return String(t??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}
function promedioCampo(lista,campo){
  if(!lista.length)return 0;
  return lista.reduce((a,b)=>a+Number(b[campo]||0),0)/lista.length;
}

async function agregarProveedor(){
  const name=document.getElementById("proveedorNombre").value.trim();
  if(!name)return alert("Escribí un proveedor");
  const r=await db.from("providers").insert({name}).select().single();
  if(r.error){alert(r.error.message);return}
  proveedorActual=r.data.id;
  document.getElementById("proveedorNombre").value="";
  await cargarTodo();
}

async function eliminarProveedor(id){
  if(!confirm("¿Eliminar proveedor con empleados y evaluaciones?"))return;
  await db.from("providers").delete().eq("id",id);
  proveedorActual=null;
  await cargarTodo();
}

async function agregarEmpleado(){
  const p=proveedor();
  const name=document.getElementById("empleadoNombre").value.trim();
  const notes=document.getElementById("empleadoObs").value.trim();
  if(!name)return alert("Escribí un empleado");
  await db.from("employees").insert({provider_id:p.id,name,notes});
  await cargarTodo();
}

async function actualizarEmpleado(id,campo,valor){
  await db.from("employees").update({[campo]:valor}).eq("id",id);
  await cargarTodo();
}

async function eliminarEmpleado(id){
  if(!confirm("¿Eliminar empleado y sus evaluaciones?"))return;
  await db.from("employees").delete().eq("id",id);
  await cargarTodo();
}

async function guardarEvaluacion(){
  const p=proveedor();
  const empId=document.getElementById("evalEmpleado").value;
  const emp=empleados.find(e=>e.id===empId);
  const q=Number(document.getElementById("calidad").value);
  const c=Number(document.getElementById("cumplimiento").value);
  const t=Number(document.getElementById("tiempo").value);
  const l=Number(document.getElementById("limpieza").value);
  const a=Number(document.getElementById("actitud").value);
  const score=Number(((q*.35)+(c*.25)+(t*.15)+(l*.10)+(a*.15)).toFixed(2));

  await db.from("evaluations").insert({
    provider_id:p.id,
    employee_id:emp.id,
    employee_name:emp.name,
    date:document.getElementById("fecha").value,
    work:document.getElementById("trabajo").value,
    quality:q,
    compliance:c,
    time_score:t,
    cleanliness:l,
    attitude:a,
    notes:document.getElementById("obsEval").value,
    score
  });

  pestaña="historial";
  await cargarTodo();
}

async function eliminarEvaluacion(id){
  if(!confirm("¿Eliminar evaluación?"))return;
  await db.from("evaluations").delete().eq("id",id);
  await cargarTodo();
}

function render(){
  renderDashboard();
  renderProveedores();
  renderDetalle();
}

function rankingProveedores(){
  return proveedores.map(p=>({
    id:p.id,
    name:p.name,
    prom:numProm(evalsDelProveedor(p.id)),
    cant:evalsDelProveedor(p.id).length
  })).sort((a,b)=>b.prom-a.prom);
}

function renderDashboard(){
  const totalProv=proveedores.length;
  const totalEmp=empleados.length;
  const totalEval=evaluaciones.length;
  const promGeneral=promedio(evaluaciones);
  const ranking=rankingProveedores().filter(x=>x.cant>0);
  const mejor=ranking[0];
  const peor=ranking.length?ranking[ranking.length-1]:null;

  document.getElementById("dashboard").innerHTML=`
    <div class="dashboard">
      <div class="stat"><div class="label">Proveedores</div><div class="num">${totalProv}</div></div>
      <div class="stat"><div class="label">Empleados</div><div class="num">${totalEmp}</div></div>
      <div class="stat"><div class="label">Evaluaciones</div><div class="num">${totalEval}</div></div>
      <div class="stat"><div class="label">Promedio general</div><div class="num">${promGeneral}</div></div>
    </div>

    <div class="panel-grid" style="margin-top:14px">
      <div class="chart-card">
        <h3>🏆 Mejor proveedor</h3>
        ${mejor?`
          <b>${limpiar(mejor.name)}</b>
          <div class="small">${mejor.cant} evaluaciones</div>
          <div class="bar-wrap"><div class="bar" style="width:${anchoBarra(mejor.prom)}%"></div></div>
          <p><span class="score ${clase(mejor.prom)}">${mejor.prom.toFixed(2)}</span></p>
        `:`<div class="empty">Todavía no hay evaluaciones.</div>`}
      </div>
      <div class="chart-card">
        <h3>⚠️ Proveedor más bajo</h3>
        ${peor?`
          <b>${limpiar(peor.name)}</b>
          <div class="small">${peor.cant} evaluaciones</div>
          <div class="bar-wrap"><div class="bar" style="width:${anchoBarra(peor.prom)}%"></div></div>
          <p><span class="score ${clase(peor.prom)}">${peor.prom.toFixed(2)}</span></p>
        `:`<div class="empty">Todavía no hay evaluaciones.</div>`}
      </div>
    </div>

    <div class="chart-card" style="margin-top:14px">
      <h3>📊 Ranking general</h3>
      <canvas id="chartGeneral"></canvas>
    </div>
  `;

  setTimeout(()=>{
    const ctx=document.getElementById("chartGeneral");
    if(!ctx)return;
    if(chartGeneral) chartGeneral.destroy();
    chartGeneral=new Chart(ctx,{
      type:"bar",
      data:{
        labels:ranking.slice(0,8).map(x=>x.name),
        datasets:[{label:"Promedio",data:ranking.slice(0,8).map(x=>x.prom)}]
      },
      options:{
        responsive:true,
        scales:{y:{beginAtZero:true,max:5}},
        plugins:{legend:{display:false}}
      }
    });
  },0);
}

function renderProveedores(){
  const q=(document.getElementById("buscarProveedor")?.value||"").toLowerCase().trim();
  const lista=rankingProveedores().filter(x=>x.name.toLowerCase().includes(q));

  document.getElementById("listaProveedores").innerHTML=lista.map(x=>`
    <div class="item ${x.id===proveedorActual?"active":""}" onclick="proveedorActual='${x.id}';pestaña='desempeno';render()">
      <div class="item-top">
        <b>${limpiar(x.name)}</b>
        <span class="score ${clase(x.prom)}">${x.cant?x.prom.toFixed(2):"-"}</span>
      </div>
      <div class="small">${empleadosDelProveedor(x.id).length} empleados · ${x.cant} evaluaciones</div>
      <div class="bar-wrap"><div class="bar" style="width:${anchoBarra(x.prom)}%"></div></div>
    </div>
  `).join("") || `<div class="empty">No encontré proveedores.</div>`;
}

function renderDetalle(){
  const p=proveedor();
  if(!p){
    document.getElementById("detalle").innerHTML="Seleccioná o cargá un proveedor.";
    return;
  }

  const evs=evalsDelProveedor(p.id);
  const pr=promedio(evs);

  document.getElementById("detalle").innerHTML=`
    <div style="display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap">
      <div>
        <h2>${limpiar(p.name)}</h2>
        <div class="small">Promedio general: ${pr} · Evaluaciones: ${evs.length}</div>
        <div style="margin-top:10px"><span class="score ${clase(Number(pr))}">${pr}</span></div>
      </div>
      <button class="danger" onclick="eliminarProveedor('${p.id}')">Eliminar proveedor</button>
    </div>

    <div class="bar-wrap" style="margin:14px 0"><div class="bar" style="width:${anchoBarra(Number(pr))}%"></div></div>

    <div class="tabs">
      <button class="${pestaña==="empleados"?"active":""}" onclick="pestaña='empleados';render()">Empleados</button>
      <button class="${pestaña==="evaluar"?"active":""}" onclick="pestaña='evaluar';render()">Nueva evaluación</button>
      <button class="${pestaña==="historial"?"active":""}" onclick="pestaña='historial';render()">Historial</button>
      <button class="${pestaña==="desempeno"?"active":""}" onclick="pestaña='desempeno';render()">Desempeño</button>
      <button class="${pestaña==="graficos"?"active":""}" onclick="pestaña='graficos';render()">Gráficos</button>
    </div>

    ${pestaña==="empleados"?vistaEmpleados(p):""}
    ${pestaña==="evaluar"?vistaEvaluar(p):""}
    ${pestaña==="historial"?vistaHistorial(p):""}
    ${pestaña==="desempeno"?vistaDesempeno(p):""}
    ${pestaña==="graficos"?vistaGraficos(p):""}
  `;
}

function vistaEmpleados(p){
  const emps=empleadosDelProveedor(p.id).sort((a,b)=>numProm(evalsDelEmpleado(b.id))-numProm(evalsDelEmpleado(a.id)));
  return `
    <h3>Empleados</h3>
    <input id="empleadoNombre" placeholder="Nombre del empleado">
    <textarea id="empleadoObs" placeholder="Observación general"></textarea>
    <button onclick="agregarEmpleado()">Agregar empleado</button>
    ${emps.map(e=>{
      const ev=evalsDelEmpleado(e.id);
      const pr=promedio(ev);
      return `
        <div class="item">
          <div class="item-top">
            <b>${limpiar(e.name)}</b>
            <span class="score ${clase(Number(pr))}">${pr}</span>
          </div>
          <div class="small">${ev.length} evaluaciones</div>
          <div class="bar-wrap"><div class="bar" style="width:${anchoBarra(Number(pr))}%"></div></div>
          <label>Nombre</label>
          <input value="${limpiar(e.name)}" onchange="actualizarEmpleado('${e.id}','name',this.value)">
          <label>Observación general</label>
          <textarea onchange="actualizarEmpleado('${e.id}','notes',this.value)">${limpiar(e.notes)}</textarea>
          <button class="danger" onclick="eliminarEmpleado('${e.id}')">Eliminar</button>
        </div>
      `;
    }).join("") || `<div class="empty">No hay empleados cargados.</div>`}
  `;
}

function vistaEvaluar(p){
  const emps=empleadosDelProveedor(p.id);
  if(!emps.length)return `<div class="empty">Primero cargá empleados.</div>`;
  return `
    <h3>Nueva evaluación</h3>
    <label>Fecha</label><input id="fecha" type="date" value="${new Date().toISOString().slice(0,10)}">
    <label>Empleado</label><select id="evalEmpleado">${emps.map(e=>`<option value="${e.id}">${limpiar(e.name)}</option>`).join("")}</select>
    <label>Trabajo / orden</label><input id="trabajo" placeholder="Ej: Rack TV orden 1542">
    ${selectPuntaje("calidad","Calidad")}
    ${selectPuntaje("cumplimiento","Cumplimiento del plano")}
    ${selectPuntaje("tiempo","Tiempo")}
    ${selectPuntaje("limpieza","Limpieza")}
    ${selectPuntaje("actitud","Actitud / predisposición")}
    <label>Observaciones</label><textarea id="obsEval"></textarea>
    <button onclick="guardarEvaluacion()">Guardar evaluación</button>
  `;
}

function selectPuntaje(id,label){
  return `<label>${label}</label><select id="${id}">
    <option value="5">5 - Excelente</option>
    <option value="4">4 - Bueno</option>
    <option value="3">3 - Regular</option>
    <option value="2">2 - Malo</option>
    <option value="1">1 - Crítico</option>
  </select>`;
}

function vistaHistorial(p){
  const evs=evalsDelProveedor(p.id);
  if(!evs.length)return `<div class="empty">Todavía no hay evaluaciones.</div>`;
  return `<h3>Historial</h3><table>
    <tr><th>Fecha</th><th>Empleado</th><th>Trabajo</th><th>Puntaje</th><th>Observación</th><th></th></tr>
    ${evs.map(e=>`<tr>
      <td>${limpiar(e.date)}</td>
      <td>${limpiar(e.employee_name)}</td>
      <td>${limpiar(e.work)}</td>
      <td><span class="score ${clase(e.score)}">${e.score}</span></td>
      <td>${limpiar(e.notes)}</td>
      <td><button class="danger" onclick="eliminarEvaluacion('${e.id}')">Eliminar</button></td>
    </tr>`).join("")}
  </table>`;
}

function vistaDesempeno(p){
  const emps=empleadosDelProveedor(p.id).sort((a,b)=>numProm(evalsDelEmpleado(b.id))-numProm(evalsDelEmpleado(a.id)));
  return `<h3>Desempeño acumulado</h3><table>
    <tr><th>Empleado</th><th>Promedio</th><th>Evaluaciones</th><th>Observación general</th></tr>
    ${emps.map(e=>{
      const ev=evalsDelEmpleado(e.id);
      const pr=promedio(ev);
      return `<tr>
        <td>${limpiar(e.name)}</td>
        <td>${pr==="-"?"-":`<span class="score ${clase(Number(pr))}">${pr}</span>`}</td>
        <td>${ev.length}</td>
        <td>${limpiar(e.notes)}</td>
      </tr>`;
    }).join("") || `<tr><td colspan="4">No hay empleados.</td></tr>`}
  </table>`;
}

function vistaGraficos(p){
  const evs=evalsDelProveedor(p.id);
  if(!evs.length)return `<div class="empty">Todavía no hay evaluaciones para generar gráficos.</div>`;

  const criterios=[
    promedioCampo(evs,"quality"),
    promedioCampo(evs,"compliance"),
    promedioCampo(evs,"time_score"),
    promedioCampo(evs,"cleanliness"),
    promedioCampo(evs,"attitude")
  ];

  const empleadosRank=empleadosDelProveedor(p.id)
    .map(e=>({name:e.name,prom:numProm(evalsDelEmpleado(e.id)),cant:evalsDelEmpleado(e.id).length}))
    .filter(x=>x.cant>0)
    .sort((a,b)=>b.prom-a.prom);

  setTimeout(()=>{
    const ctx=document.getElementById("chartProveedor");
    if(!ctx)return;
    if(chartProveedor) chartProveedor.destroy();
    chartProveedor=new Chart(ctx,{
      type:"radar",
      data:{
        labels:["Calidad","Cumplimiento","Tiempo","Limpieza","Actitud"],
        datasets:[{label:"Promedio",data:criterios}]
      },
      options:{
        responsive:true,
        scales:{r:{beginAtZero:true,max:5}}
      }
    });
  },0);

  return `
    <h3>Gráficos del proveedor</h3>
    <div class="panel-grid">
      <div class="chart-card">
        <h3>Promedio por criterio</h3>
        <canvas id="chartProveedor"></canvas>
      </div>
      <div class="chart-card">
        <h3>Ranking de empleados</h3>
        ${empleadosRank.map(x=>`
          <div class="chart-row">
            <div class="chart-label">${limpiar(x.name)}</div>
            <div class="bar-wrap"><div class="bar" style="width:${anchoBarra(x.prom)}%"></div></div>
            <span class="score ${clase(x.prom)}">${x.prom.toFixed(2)}</span>
          </div>
        `).join("") || `<div class="empty">Sin datos por empleado.</div>`}
      </div>
    </div>

    <div class="chart-card" style="margin-top:14px">
      <h3>Últimas evaluaciones</h3>
      ${evs.slice(0,10).reverse().map(e=>`
        <div class="chart-row">
          <div class="chart-label">${limpiar(e.date)} · ${limpiar(e.employee_name)}</div>
          <div class="bar-wrap"><div class="bar" style="width:${anchoBarra(e.score)}%"></div></div>
          <span class="score ${clase(e.score)}">${Number(e.score).toFixed(2)}</span>
        </div>
      `).join("")}
    </div>
  `;
}
</script>
</body>
</html>
